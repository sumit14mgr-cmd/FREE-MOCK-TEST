<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE MOCK TEST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 onclick="showView('category-view')" style="cursor:pointer">FREE MOCK TEST</h1>
        <div class="ad-banner">Adsense Banner Area</div>
    </header>

    <div class="container">
        <div id="category-view" class="view">
            <h2 class="section-title">Select Subject</h2>
            <div class="category-grid">
                <button class="card" onclick="showMonthlyView()">
                    <span class="icon">📅</span>
                    <span>Current Affairs</span>
                </button>
                <button class="card disabled"><span>History</span></button>
            </div>
        </div>

        <div id="monthly-view" class="view hide">
            <button class="back-btn" onclick="showView('category-view')">← Back</button>
            <h2 class="section-title">Select Month</h2>
            <div id="month-list" class="month-grid"></div>
        </div>

        <div id="set-view" class="view hide">
            <button class="back-btn" onclick="showView('monthly-view')">← Back</button>
            <h2 id="month-name-title" class="section-title">Month</h2>
            <div id="set-list" class="set-container"></div>
        </div>

        <div id="quiz-view" class="view hide">
            <div class="quiz-header">
                <span id="q-count">Question 1/10</span>
                <div class="neg-box">Neg Mark: <input type="number" id="negMark" value="0.25" step="0.05"></div>
            </div>
            <div class="quiz-card">
                <div id="question-text">Loading...</div>
                <div id="options-list"></div>
                <div class="nav-controls">
                    <button onclick="changeQuestion(-1)">Previous</button>
                    <button onclick="changeQuestion(1)">Next / Skip</button>
                </div>
                <button id="submitBtn" class="hide submit-btn" onclick="showResult()">Submit Quiz</button>
            </div>
        </div>

        <div id="result-view" class="view hide">
            <h2 class="section-title">Result & Performance</h2>
            <div class="score-card">
                <div class="score-item">Total Qs: <span id="res-total"></span></div>
                <div class="score-item">Correct: <span id="res-correct" style="color:green"></span></div>
                <div class="score-item">Wrong: <span id="res-wrong" style="color:red"></span></div>
                <div class="score-item highlight">Your Score: <span id="res-score"></span></div>
            </div>
            <div id="analysis-section" class="analysis-box"></div>
            <div class="result-btns">
                <button class="sol-btn" onclick="showSolutions()">View Solutions & Explanations</button>
                <button class="re-btn" onclick="reattempt()">Re-attempt Test</button>
            </div>
        </div>

        <div id="solution-view" class="view hide">
            <button class="back-btn" onclick="showView('result-view')">← Back to Score</button>
            <div id="solution-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
