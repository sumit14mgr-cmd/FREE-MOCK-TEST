<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE MOCK TEST</title>
    <style>
        :root { --primary: #1a237e; --accent: #0288d1; --bg: #f4f7f6; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        
        /* Navigation Views */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .section-title { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .category-grid, .month-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card, .month-btn { background: white; border: none; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; font-weight: bold; }
        .set-btn { width: 100%; padding: 18px; margin-bottom: 12px; border: none; background: #e3f2fd; color: #0d47a1; border-left: 6px solid #0d47a1; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: left; }
        
        /* Settings & Quiz UI */
        .settings-card, .quiz-card, .score-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .option { padding: 15px; border: 2px solid #eee; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        .option.selected { background: #bbdefb; border-color: #1976d2; font-weight: bold; }
        
        .timer-box { font-size: 20px; font-weight: bold; color: #d32f2f; text-align: center; margin-bottom: 10px; }
        .nav-controls { display: flex; justify-content: space-between; margin-top: 20px; }
        
        /* Buttons */
        .btn-block { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; margin-top: 10px; }
        .btn-start { background: var(--success); }
        .btn-submit { background: #000; }
        .back-btn { background: #666; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }

        /* Analysis & Solutions */
        .score-item { padding: 10px; background: #f8f9fa; border-radius: 8px; text-align: center; font-weight: bold; }
        .highlight { background: #fff9c4; grid-column: span 2; font-size: 1.2rem; }
        .analysis-box { background: #ffebee; padding: 15px; border-radius: 10px; border-left: 5px solid #d32f2f; margin-top: 20px; }
        .sol-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .exp-box { background: #f1f8e9; padding: 10px; margin-top: 10px; font-size: 14px; border-radius: 5px; color: #33691e; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="window.location.reload()" style="cursor:pointer">FREE MOCK TEST</h1>
    </header>

    <div class="container">
        <div id="category-view" class="view active">
            <h2 class="section-title">Select Subject</h2>
            <div class="category-grid">
                <button class="card" onclick="showMonthlyView()">📅<br>Current Affairs</button>
                <button class="card" style="opacity:0.5" disabled>📜<br>History</button>
            </div>
        </div>

        <div id="monthly-view" class="view">
            <button class="back-btn" onclick="showView('category-view')">← Back</button>
            <h2 class="section-title">Select Month</h2>
            <div id="month-list" class="month-grid"></div>
        </div>

        <div id="set-view" class="view">
            <button class="back-btn" onclick="showView('monthly-view')">← Back</button>
            <h2 id="month-title" class="section-title">Month</h2>
            <div id="set-list"></div>
        </div>

        <div id="settings-view" class="view">
            <button class="back-btn" onclick="showView('set-view')">← Back</button>
            <h2 class="section-title">Set Test Rules</h2>
            <div class="settings-card">
                <div class="input-group">
                    <label>Negative Marking (per wrong answer):</label>
                    <input type="number" id="negMarkInput" value="0.25" step="0.05">
                </div>
                <div class="input-group">
                    <label>Time Duration (Minutes):</label>
                    <select id="timeLimitInput">
                        <option value="5">5 Minutes</option>
                        <option value="10" selected>10 Minutes</option>
                        <option value="20">20 Minutes</option>
                        <option value="60">1 Hour</option>
                    </select>
                </div>
                <button class="btn-block btn-start" onclick="startQuizNow()">START TEST</button>
            </div>
        </div>

        <div id="quiz-view" class="view">
            <div class="timer-box" id="timer-display">Time: 10:00</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="q-count" style="font-weight:bold">Question 1</span>
            </div>
            <div class="quiz-card">
                <div id="question-text" style="font-weight:bold; font-size:18px;"></div>
                <div id="options-list"></div>
                <div class="nav-controls">
                    <button onclick="changeQuestion(-1)">Previous</button>
                    <button onclick="changeQuestion(1)">Next / Skip</button>
                </div>
                <button id="finalSubmitBtn" class="btn-block btn-submit" style="display:none; margin-top:20px;" onclick="finishQuiz()">Submit Quiz</button>
            </div>
        </div>

        <div id="result-view" class="view">
            <h2 class="section-title">Performance Report</h2>
            <div class="score-card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="score-item">Total Qs: <span id="res-total"></span></div>
                <div class="score-item">Correct: <span id="res-correct" style="color:green"></span></div>
                <div class="score-item">Wrong: <span id="res-wrong" style="color:red"></span></div>
                <div class="score-item highlight">Final Score: <span id="res-score"></span></div>
            </div>
            
            <div id="analysis-box" class="analysis-box"></div>

            <button class="btn-block" style="background:var(--accent)" onclick="showSolutions()">View Detailed Solutions</button>
            <button class="btn-block" style="background:#666" onclick="location.reload()">Re-attempt / Home</button>
        </div>

        <div id="solution-view" class="view">
            <button class="back-btn" onclick="showView('result-view')">← Back to Score</button>
            <h2 class="section-title">Answers & Logic</h2>
            <div id="solution-list"></div>
        </div>
    </div>

    <script>
        const database = {
            "January 2026": {
                "Bihar Special": [
                    { q: "Bihar ka pehla floating solar plant kaha hai?", a: ["Patna", "Darbhanga", "Supaul", "Gaya"], c: 1, exp: "Darbhanga ke Kadirabad mein bana hai.", sec: "Bihar Energy" },
                    { q: "Bihar startup policy kab aayi?", a: ["2022", "2023", "2024", "2026"], c: 0, exp: "2022 mein launch hui thi.", sec: "Governance" },
                    { q: "BPSC ke naye chairman?", a: ["Person A", "Person B", "Person C", "Person D"], c: 2, exp: "Data updated as per 2026.", sec: "Appointments" }
                ]
            }
        };

        let activeMonth = "", currentQs = [], qIndex = 0, userAns = {}, timer;
        let timeLeft = 0, currentSetName = "";

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function showMonthlyView() {
            showView('monthly-view');
            const list = document.getElementById('month-list');
            list.innerHTML = Object.keys(database).map(m => `<button class="month-btn" onclick="showSetView('${m}')">${m}</button>`).join('');
        }

        function showSetView(month) {
            activeMonth = month;
            showView('set-view');
            document.getElementById('month-title').innerText = month;
            const list = document.getElementById('set-list');
            list.innerHTML = Object.keys(database[month]).map(s => `<button class="set-btn" onclick="prepareSettings('${s}')">${s}</button>`).join('');
        }

        function prepareSettings(setName) {
            currentSetName = setName;
            showView('settings-view');
        }

        function startQuizNow() {
            currentQs = database[activeMonth][currentSetName];
            qIndex = 0; userAns = {};
            timeLeft = parseInt(document.getElementById('timeLimitInput').value) * 60;
            showView('quiz-view');
            loadQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer-display').innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(timer); finishQuiz(); }
                timeLeft--;
            }, 1000);
        }

        function loadQuestion() {
            const q = currentQs[qIndex];
            document.getElementById('q-count').innerText = `Question ${qIndex + 1}/${currentQs.length}`;
            document.getElementById('question-text').innerText = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = q.a.map((opt, i) => `
                <div class="option ${userAns[qIndex] === i ? 'selected' : ''}" onclick="saveAns(${i})">${opt}</div>
            `).join('');
            document.getElementById('finalSubmitBtn').style.display = (qIndex === currentQs.length - 1) ? 'block' : 'none';
        }

        function saveAns(i) { userAns[qIndex] = i; loadQuestion(); }

        function changeQuestion(n) {
            if(qIndex + n >= 0 && qIndex + n < currentQs.length) { qIndex += n; loadQuestion(); }
        }

        function finishQuiz() {
            clearInterval(timer);
            showView('result-view');
            let correct = 0, wrong = 0, neg = parseFloat(document.getElementById('negMarkInput').value);
            let weakAreas = {};

            currentQs.forEach((q, i) => {
                if(userAns[i] === q.c) {
                    correct++;
                } else if(userAns[i] !== undefined) {
                    wrong++;
                    weakAreas[q.sec] = (weakAreas[q.sec] || 0) + 1;
                }
            });

            document.getElementById('res-total').innerText = currentQs.length;
            document.getElementById('res-correct').innerText = correct;
            document.getElementById('res-wrong').innerText = wrong;
            document.getElementById('res-score').innerText = (correct - (wrong * neg)).toFixed(2);

            // Weak Section Analysis
            let aBox = document.getElementById('analysis-box');
            let weakHtml = "<h3>Weak Section Analysis:</h3>";
            if(Object.keys(weakAreas).length > 0) {
                for(let sec in weakAreas) {
                    weakHtml += `<p>❌ <b>${sec}:</b> You missed ${weakAreas[sec]} questions.</p>`;
                }
            } else {
                weakHtml += "<p>✅ All sections are strong! Keep it up.</p>";
            }
            aBox.innerHTML = weakHtml;
        }

        function showSolutions() {
            showView('solution-view');
            const list = document.getElementById('solution-list');
            list.innerHTML = currentQs.map((q, i) => `
                <div class="sol-card" style="border-left-color: ${userAns[i] === q.c ? 'green' : 'red'}">
                    <p><b>Q${i+1}: ${q.q}</b></p>
                    <p style="color:green">Correct: ${q.a[q.c]}</p>
                    <div class="exp-box"><b>Logic:</b> ${q.exp}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
