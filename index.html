<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSC EXAM PORTAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ad-banner" id="top-ad">
        HEADER AD BANNER (728x90)
    </div>

    <header>
        <h1 onclick="location.reload()" style="cursor:pointer">FREE MOCK TEST</h1>
    </header>

    <div class="container">
        <div id="category-view" class="view active">
            <h2 class="section-title">Select Subject</h2>
            <div class="category-grid">
                <button class="card" onclick="showSetView()">📅<br>Bihar Current Affairs</button>
                <button class="card" style="opacity:0.5" disabled>📜<br>History (Coming Soon)</button>
            </div>
        </div>

        <div id="set-view" class="view">
            <button class="back-btn" onclick="showView('category-view')">← Back</button>
            <h2 class="section-title">January 2026 Sets</h2>
            <div id="set-list">
                <button class="set-btn" onclick="prepareSettings()">Bihar Special Test 1</button>
            </div>
        </div>

        <div id="settings-view" class="view">
            <button class="back-btn" onclick="showView('set-view')">← Back</button>
            <div class="settings-card">
                <h3>Test Settings</h3>
                <div class="input-group">
                    <label>Negative Marking (e.g. 0.25):</label>
                    <input type="number" id="negMarkInput" value="0.25" step="0.01">
                </div>
                <div class="input-group">
                    <label>Test Time (Minutes):</label>
                    <input type="number" id="timeLimitInput" value="15">
                </div>
                <button class="btn-block" style="background:#2e7d32" onclick="startQuizNow()">START TEST</button>
            </div>
        </div>

        <div id="quiz-view" class="view">
            <div class="timer-bar" id="timer-display">Time: 15:00</div>
            <div class="quiz-card">
                <span id="q-count" style="color:#0288d1; font-weight:bold;"></span>
                <div id="question-area" style="margin-top:10px;"></div>
                <div id="options-list"></div>
                
                <div class="ad-banner" style="margin-top:15px; height:60px; line-height:60px;">IN-QUIZ AD</div>

                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button class="back-btn" id="prevBtn" onclick="changeQuestion(-1)">← Previous</button>
                    <button class="back-btn" id="nextBtn" onclick="changeQuestion(1)">Next / Skip →</button>
                </div>
                <button id="finalSubmitBtn" class="btn-block" style="display:none; background:#000;" onclick="finishQuiz()">Final Submit</button>
            </div>
        </div>

        <div id="result-view" class="view">
            <h2 class="section-title">Performance Report</h2>
            <div class="score-card">
                <div class="score-item">Total: <span id="res-total"></span></div>
                <div class="score-item">Correct: <span id="res-correct" style="color:green"></span></div>
                <div class="score-item">Wrong: <span id="res-wrong" style="color:red"></span></div>
                <div class="score-item" style="grid-column: span 2; background:#fff9c4;">Final Score: <span id="res-score"></span></div>
            </div>
            <div id="analysis-box" class="analysis-box"></div>
            <button class="btn-block" style="background:#0288d1" onclick="showSolutions('all')">VIEW ALL SOLUTIONS</button>
            <button class="btn-block" style="background:#666" onclick="location.reload()">TRY ANOTHER TEST</button>
        </div>

        <div id="solution-view" class="view">
            <button class="back-btn" onclick="showView('result-view')">← Back to Score</button>
            <div id="solution-list"></div>
        </div>
    </div>

    <div class="footer-ad">
        <div class="ad-banner" style="margin:0 auto; width:100%;">
            STICKY FOOTER BANNER AD
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
