<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE MOCK TEST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>FREE MOCK TEST</h1>
        <div class="ad-container">
            <p style="color: #666; font-size: 12px;">Advertisement</p>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab('current-affairs')">Current Affairs</button>
        <button class="tab-btn" onclick="openTab('science')">Science</button>
        <button class="tab-btn" onclick="openTab('history')">History</button>
    </nav>

    <main id="quiz-container">
        <div id="question-box">
            <h2 id="tab-title">Current Affairs Quiz</h2>
            <div id="question-text">Question will appear here...</div>
            <div id="options-container"></div>
            <button id="next-btn" onclick="nextQuestion()" style="display:none;">Next Question</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
